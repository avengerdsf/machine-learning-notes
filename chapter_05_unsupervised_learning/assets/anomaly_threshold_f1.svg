<svg xmlns="http://www.w3.org/2000/svg" width="760" height="470" viewBox="0 0 760 470">
  <defs>
    <style>
      .title{font:700 24px Arial,"Microsoft YaHei",sans-serif;fill:#111827;text-anchor:middle}
      .label{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#374151}
      .axis{stroke:#111827;stroke-width:2}
      .grid{stroke:#e5e7eb;stroke-width:1}
      .precision{fill:none;stroke:#2563eb;stroke-width:4}
      .recall{fill:none;stroke:#16a34a;stroke-width:4}
      .f1{fill:none;stroke:#dc2626;stroke-width:4}
      .best{stroke:#dc2626;stroke-width:2;stroke-dasharray:6 6}
      .legend-text{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#111827}
    </style>
  </defs>

  <rect width="760" height="470" fill="#ffffff"/>
  <text x="380" y="36" class="title">用验证集选择异常检测阈值 ε</text>

  <g transform="translate(85,65)">
    <line x1="0" y1="330" x2="600" y2="330" class="axis"/>
    <line x1="0" y1="330" x2="0" y2="30" class="axis"/>
    <text x="575" y="360" class="label">ε 从小到大</text>
    <text x="-56" y="24" class="label">指标值</text>

    <line x1="0" y1="270" x2="600" y2="270" class="grid"/>
    <line x1="0" y1="210" x2="600" y2="210" class="grid"/>
    <line x1="0" y1="150" x2="600" y2="150" class="grid"/>
    <line x1="0" y1="90" x2="600" y2="90" class="grid"/>
    <line x1="120" y1="30" x2="120" y2="330" class="grid"/>
    <line x1="240" y1="30" x2="240" y2="330" class="grid"/>
    <line x1="360" y1="30" x2="360" y2="330" class="grid"/>
    <line x1="480" y1="30" x2="480" y2="330" class="grid"/>

    <path d="M30 70 C120 75, 200 95, 280 135 C380 185, 470 235, 570 285" class="precision"/>
    <path d="M30 295 C120 260, 190 210, 265 160 C350 105, 455 78, 570 65" class="recall"/>
    <path d="M30 285 C110 235, 190 155, 285 95 C365 120, 455 180, 570 250" class="f1"/>

    <line x1="285" y1="330" x2="285" y2="95" class="best"/>
    <circle cx="285" cy="95" r="7" fill="#dc2626"/>
    <text x="300" y="92" class="label">F1 最大</text>

    <g transform="translate(385,34)">
      <line x1="0" y1="0" x2="34" y2="0" class="precision"/>
      <text x="44" y="5" class="legend-text">Precision</text>
      <line x1="0" y1="28" x2="34" y2="28" class="recall"/>
      <text x="44" y="33" class="legend-text">Recall</text>
      <line x1="0" y1="56" x2="34" y2="56" class="f1"/>
      <text x="44" y="61" class="legend-text">F1</text>
    </g>
  </g>
</svg>
