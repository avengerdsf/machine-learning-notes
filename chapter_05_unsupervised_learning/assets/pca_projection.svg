<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500">
  <defs>
    <style>
      .title{font:700 24px Arial,"Microsoft YaHei",sans-serif;fill:#111827;text-anchor:middle}
      .label{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#374151}
      .axis{stroke:#111827;stroke-width:2}
      .grid{stroke:#e5e7eb;stroke-width:1}
      .point{fill:#2563eb;stroke:#1d4ed8;stroke-width:1.5}
      .proj{fill:#dc2626;stroke:#991b1b;stroke-width:1.5}
      .u1{stroke:#16a34a;stroke-width:4}
      .u2{stroke:#f97316;stroke-width:3;stroke-dasharray:7 7}
      .err{stroke:#6b7280;stroke-width:1.5;stroke-dasharray:5 5}
    </style>
  </defs>
  <rect width="760" height="500" fill="#ffffff"/>
  <text x="380" y="36" class="title">PCA：投影到最大方差方向</text>

  <g transform="translate(90,70)">
    <line x1="0" y1="360" x2="590" y2="360" class="axis"/>
    <line x1="0" y1="360" x2="0" y2="20" class="axis"/>
    <text x="600" y="365" class="label">x₁</text>
    <text x="-18" y="16" class="label">x₂</text>

    <line x1="100" y1="20" x2="100" y2="360" class="grid"/>
    <line x1="200" y1="20" x2="200" y2="360" class="grid"/>
    <line x1="300" y1="20" x2="300" y2="360" class="grid"/>
    <line x1="400" y1="20" x2="400" y2="360" class="grid"/>
    <line x1="500" y1="20" x2="500" y2="360" class="grid"/>
    <line x1="0" y1="280" x2="590" y2="280" class="grid"/>
    <line x1="0" y1="200" x2="590" y2="200" class="grid"/>
    <line x1="0" y1="120" x2="590" y2="120" class="grid"/>
    <line x1="0" y1="40" x2="590" y2="40" class="grid"/>

    <line x1="75" y1="315" x2="540" y2="80" class="u1"/>
    <line x1="225" y1="80" x2="390" y2="320" class="u2"/>
    <text x="515" y="72" class="label">第一主成分 u¹</text>
    <text x="392" y="316" class="label">被丢弃方向</text>

    <line x1="180" y1="278" x2="195" y2="254" class="err"/>
    <line x1="245" y1="223" x2="250" y2="226" class="err"/>
    <line x1="310" y1="210" x2="300" y2="201" class="err"/>
    <line x1="385" y1="145" x2="365" y2="170" class="err"/>
    <line x1="460" y1="112" x2="430" y2="137" class="err"/>
    <line x1="125" y1="308" x2="150" y2="292" class="err"/>
    <line x1="520" y1="90" x2="500" y2="100" class="err"/>

    <circle cx="180" cy="278" r="6" class="point"/>
    <circle cx="245" cy="223" r="6" class="point"/>
    <circle cx="310" cy="210" r="6" class="point"/>
    <circle cx="385" cy="145" r="6" class="point"/>
    <circle cx="460" cy="112" r="6" class="point"/>
    <circle cx="125" cy="308" r="6" class="point"/>
    <circle cx="520" cy="90" r="6" class="point"/>

    <circle cx="195" cy="254" r="5" class="proj"/>
    <circle cx="250" cy="226" r="5" class="proj"/>
    <circle cx="300" cy="201" r="5" class="proj"/>
    <circle cx="365" cy="170" r="5" class="proj"/>
    <circle cx="430" cy="137" r="5" class="proj"/>
    <circle cx="150" cy="292" r="5" class="proj"/>
    <circle cx="500" cy="100" r="5" class="proj"/>

    <text x="120" y="34" class="label">蓝点：原始样本</text>
    <text x="120" y="56" class="label">红点：投影重建点</text>
    <text x="120" y="78" class="label">灰线：重建误差</text>
  </g>
</svg>
