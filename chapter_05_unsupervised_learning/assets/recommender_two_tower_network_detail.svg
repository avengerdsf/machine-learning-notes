<svg xmlns="http://www.w3.org/2000/svg" width="820" height="620" viewBox="0 0 820 620">
  <defs>
    <style>
      .title{font:700 24px Arial,"Microsoft YaHei",sans-serif;fill:#111827;text-anchor:middle}
      .label{font:15px Arial,"Microsoft YaHei",sans-serif;fill:#374151;text-anchor:middle}
      .small{font:13px Arial,"Microsoft YaHei",sans-serif;fill:#4b5563;text-anchor:middle}
      .user{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:12}
      .item{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}
      .vec{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:12}
      .score{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:12}
      .arrow{stroke:#111827;stroke-width:2;marker-end:url(#arrow)}
      .dash{stroke:#6b7280;stroke-width:2;stroke-dasharray:6 6}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#111827"/>
    </marker>
  </defs>

  <rect width="820" height="620" fill="#ffffff"/>
  <text x="410" y="38" class="title">基于内容推荐：双塔网络详细结构</text>

  <g transform="translate(55,95)">
    <rect x="0" y="0" width="130" height="70" class="user"/>
    <text x="65" y="28" class="label">用户特征</text>
    <text x="65" y="52" class="small">xᵤ</text>

    <rect x="175" y="0" width="120" height="70" class="user"/>
    <text x="235" y="28" class="label">Dense + ReLU</text>
    <text x="235" y="52" class="small">aᵤ[1]</text>

    <rect x="340" y="0" width="120" height="70" class="user"/>
    <text x="400" y="28" class="label">Dense + ReLU</text>
    <text x="400" y="52" class="small">aᵤ[2]</text>

    <rect x="505" y="0" width="110" height="70" class="vec"/>
    <text x="560" y="28" class="label">输出向量</text>
    <text x="560" y="52" class="small">vᵤ</text>

    <line x1="130" y1="35" x2="170" y2="35" class="arrow"/>
    <line x1="295" y1="35" x2="335" y2="35" class="arrow"/>
    <line x1="460" y1="35" x2="500" y2="35" class="arrow"/>
  </g>

  <g transform="translate(55,270)">
    <rect x="0" y="0" width="130" height="70" class="item"/>
    <text x="65" y="28" class="label">物品特征</text>
    <text x="65" y="52" class="small">xₘ</text>

    <rect x="175" y="0" width="120" height="70" class="item"/>
    <text x="235" y="28" class="label">Dense + ReLU</text>
    <text x="235" y="52" class="small">aₘ[1]</text>

    <rect x="340" y="0" width="120" height="70" class="item"/>
    <text x="400" y="28" class="label">Dense + ReLU</text>
    <text x="400" y="52" class="small">aₘ[2]</text>

    <rect x="505" y="0" width="110" height="70" class="vec"/>
    <text x="560" y="28" class="label">输出向量</text>
    <text x="560" y="52" class="small">vₘ</text>

    <line x1="130" y1="35" x2="170" y2="35" class="arrow"/>
    <line x1="295" y1="35" x2="335" y2="35" class="arrow"/>
    <line x1="460" y1="35" x2="500" y2="35" class="arrow"/>
  </g>

  <g transform="translate(670,172)">
    <rect x="0" y="0" width="110" height="90" class="score"/>
    <text x="55" y="30" class="label">点积</text>
    <text x="55" y="56" class="small">ŷ = vᵤ · vₘ</text>
  </g>

  <line x1="670" y1="130" x2="705" y2="170" class="arrow"/>
  <line x1="670" y1="305" x2="705" y2="265" class="arrow"/>

  <g transform="translate(185,440)">
    <rect x="0" y="0" width="450" height="95" class="score"/>
    <text x="225" y="30" class="label">训练目标</text>
    <text x="225" y="56" class="small">评分标签：1/2(vᵤ·vₘ - y)² + 正则化</text>
    <text x="225" y="78" class="small">0/1 标签：交叉熵 + λ/2(||Wᵤ||² + ||Wₘ||²)</text>
  </g>

  <line x1="705" y1="263" x2="455" y2="438" class="dash"/>
  <text x="410" y="585" class="small">反向传播同时更新用户塔参数和物品塔参数；推理时预先缓存所有物品向量，再与用户向量做相似度排序。</text>
</svg>
