<svg xmlns="http://www.w3.org/2000/svg" width="760" height="470" viewBox="0 0 760 470">
  <defs>
    <style>
      .title{font:700 24px Arial,"Microsoft YaHei",sans-serif;fill:#111827;text-anchor:middle}
      .label{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#374151}
      .axis{stroke:#111827;stroke-width:2}
      .grid{stroke:#e5e7eb;stroke-width:1}
      .bar{fill:#93c5fd;stroke:#2563eb;stroke-width:2}
      .line{fill:none;stroke:#dc2626;stroke-width:4}
      .target{stroke:#16a34a;stroke-width:2;stroke-dasharray:6 6}
      .dot{fill:#dc2626;stroke:#991b1b;stroke-width:2}
    </style>
  </defs>
  <rect width="760" height="470" fill="#ffffff"/>
  <text x="380" y="36" class="title">用累计保留方差选择 k</text>

  <g transform="translate(90,70)">
    <line x1="0" y1="330" x2="590" y2="330" class="axis"/>
    <line x1="0" y1="330" x2="0" y2="30" class="axis"/>
    <text x="570" y="360" class="label">主成分数量 k</text>
    <text x="-62" y="24" class="label">保留方差</text>

    <line x1="0" y1="270" x2="590" y2="270" class="grid"/>
    <line x1="0" y1="210" x2="590" y2="210" class="grid"/>
    <line x1="0" y1="150" x2="590" y2="150" class="grid"/>
    <line x1="0" y1="90" x2="590" y2="90" class="grid"/>

    <line x1="0" y1="45" x2="590" y2="45" class="target"/>
    <text x="500" y="38" class="label">95% 阈值</text>

    <rect x="110" y="41" width="90" height="289" class="bar"/>
    <rect x="390" y="30" width="90" height="300" class="bar"/>

    <path d="M155 41 L435 30" class="line"/>
    <circle cx="155" cy="41" r="7" class="dot"/>
    <circle cx="435" cy="30" r="7" class="dot"/>

    <text x="155" y="355" class="label" text-anchor="middle">k=1</text>
    <text x="435" y="355" class="label" text-anchor="middle">k=2</text>
    <text x="155" y="30" class="label" text-anchor="middle">96.3%</text>
    <text x="435" y="20" class="label" text-anchor="middle">100%</text>
    <text x="235" y="410" class="label">最小满足阈值的 k 为 1</text>
  </g>
</svg>
