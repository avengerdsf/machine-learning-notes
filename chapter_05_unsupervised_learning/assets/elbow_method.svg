<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430">
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #1f2937; }
    .title { font-size: 22px; font-weight: 700; text-anchor: middle; }
    .axis { stroke: #334155; stroke-width: 2; }
    .grid { stroke: #e2e8f0; stroke-width: 1; }
    .tick { font-size: 14px; text-anchor: middle; }
    .label { font-size: 17px; font-weight: 600; text-anchor: middle; }
    .curve { fill: none; stroke: #2563eb; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .point { fill: #ffffff; stroke: #2563eb; stroke-width: 3; }
    .elbow { fill: #ea580c; stroke: #ffffff; stroke-width: 2; }
    .annotation { font-size: 16px; font-weight: 700; fill: #c2410c; }
  </style>

  <rect width="760" height="430" fill="#ffffff"/>
  <text x="380" y="34" class="title">使用肘部法则选择聚类数量 K</text>

  <g>
    <line x1="95" y1="75" x2="95" y2="350" class="axis"/>
    <line x1="95" y1="350" x2="690" y2="350" class="axis"/>
    <line x1="95" y1="290" x2="690" y2="290" class="grid"/>
    <line x1="95" y1="230" x2="690" y2="230" class="grid"/>
    <line x1="95" y1="170" x2="690" y2="170" class="grid"/>
    <line x1="95" y1="110" x2="690" y2="110" class="grid"/>

    <polyline points="145,100 245,185 345,260 445,285 545,300 645,310" class="curve"/>
    <circle cx="145" cy="100" r="7" class="point"/>
    <circle cx="245" cy="185" r="7" class="point"/>
    <circle cx="345" cy="260" r="9" class="elbow"/>
    <circle cx="445" cy="285" r="7" class="point"/>
    <circle cx="545" cy="300" r="7" class="point"/>
    <circle cx="645" cy="310" r="7" class="point"/>

    <line x1="355" y1="250" x2="425" y2="195" stroke="#ea580c" stroke-width="2"/>
    <text x="437" y="190" class="annotation">肘点 K = 3</text>

    <text x="145" y="375" class="tick">1</text>
    <text x="245" y="375" class="tick">2</text>
    <text x="345" y="375" class="tick">3</text>
    <text x="445" y="375" class="tick">4</text>
    <text x="545" y="375" class="tick">5</text>
    <text x="645" y="375" class="tick">6</text>
    <text x="392" y="410" class="label">聚类数量 K</text>
    <text x="28" y="215" class="label" transform="rotate(-90 28 215)">失真代价 J</text>
  </g>
</svg>
