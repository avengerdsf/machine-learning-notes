<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="660" viewBox="0 0 1100 660" role="img" aria-labelledby="title desc">
  <title id="title">正则化参数对训练误差和验证误差的影响</title>
  <desc id="desc">训练误差随正则化参数增大而上升，验证误差先下降后上升，并在最佳正则化参数处达到最小值。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 27px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .label { font: 600 17px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #1e293b; }
      .small { font: 15px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .math { font: italic 18px Georgia, "Times New Roman", serif; fill: #334155; }
      .grid { stroke: #e2e8f0; stroke-width: 1; }
      .axis { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .train { fill: none; stroke: #2563eb; stroke-width: 4; stroke-linecap: round; }
      .cv { fill: none; stroke: #dc2626; stroke-width: 4; stroke-linecap: round; }
      .guide { stroke: #16a34a; stroke-width: 2; stroke-dasharray: 7 6; }
    </style>
  </defs>

  <rect x="1" y="1" width="1098" height="658" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="550" y="45" class="title" text-anchor="middle">正则化参数 λ 对训练误差和验证误差的影响</text>

  <rect x="105" y="90" width="285" height="445" fill="#fff1f2" opacity="0.75"/>
  <rect x="390" y="90" width="265" height="445" fill="#f0fdf4" opacity="0.8"/>
  <rect x="655" y="90" width="335" height="445" fill="#faf5ff" opacity="0.8"/>

  <g aria-hidden="true">
    <line x1="105" y1="145" x2="990" y2="145" class="grid"/>
    <line x1="105" y1="240" x2="990" y2="240" class="grid"/>
    <line x1="105" y1="335" x2="990" y2="335" class="grid"/>
    <line x1="105" y1="430" x2="990" y2="430" class="grid"/>
    <line x1="260" y1="90" x2="260" y2="535" class="grid"/>
    <line x1="525" y1="90" x2="525" y2="535" class="grid"/>
    <line x1="800" y1="90" x2="800" y2="535" class="grid"/>
  </g>

  <line x1="105" y1="535" x2="1010" y2="535" class="axis"/>
  <line x1="105" y1="535" x2="105" y2="75" class="axis"/>
  <text x="1018" y="542" class="math">λ</text>
  <text x="72" y="98" class="small" transform="rotate(-90 72 98)">误差</text>

  <text x="245" y="118" class="label" text-anchor="middle">λ 过小：高方差</text>
  <text x="525" y="118" class="label" text-anchor="middle">偏差与方差平衡</text>
  <text x="820" y="118" class="label" text-anchor="middle">λ 过大：高偏差</text>

  <path d="M 135 520 C 320 515, 500 482, 680 420 C 790 382, 885 345, 965 305" class="train"/>
  <path d="M 135 230 C 285 355, 405 445, 525 470 C 655 470, 760 390, 965 205" class="cv"/>

  <line x1="525" y1="135" x2="525" y2="535" class="guide"/>
  <circle cx="525" cy="470" r="7" fill="#16a34a"/>
  <rect x="425" y="160" width="200" height="65" rx="10" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="525" y="188" class="label" text-anchor="middle">验证误差最低</text>
  <text x="525" y="213" class="math" text-anchor="middle">λ<tspan baseline-shift="super" font-size="12">*</tspan></text>

  <line x1="690" y1="155" x2="740" y2="155" class="train"/>
  <text x="754" y="161" class="small">
    <tspan font-style="italic">J</tspan><tspan baseline-shift="sub" font-size="11">train</tspan>
  </text>
  <line x1="835" y1="155" x2="885" y2="155" class="cv"/>
  <text x="899" y="161" class="small">
    <tspan font-style="italic">J</tspan><tspan baseline-shift="sub" font-size="11">cv</tspan>
  </text>

  <text x="135" y="562" class="math" text-anchor="middle">0</text>
  <text x="525" y="562" class="math" text-anchor="middle">λ<tspan baseline-shift="super" font-size="12">*</tspan></text>
  <text x="965" y="562" class="small" text-anchor="middle">较大的 λ</text>

  <rect x="130" y="585" width="230" height="48" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="245" y="606" class="small" text-anchor="middle">约束弱，模型容易过拟合</text>
  <text x="245" y="625" class="small" text-anchor="middle">验证误差较高</text>

  <rect x="410" y="585" width="230" height="48" rx="10" fill="#f0fdf4" stroke="#86efac"/>
  <text x="525" y="606" class="small" text-anchor="middle">选择验证误差最小的</text>
  <text x="525" y="625" class="math" text-anchor="middle">λ<tspan baseline-shift="super" font-size="12">*</tspan></text>

  <rect x="705" y="585" width="230" height="48" rx="10" fill="#faf5ff" stroke="#d8b4fe"/>
  <text x="820" y="606" class="small" text-anchor="middle">约束强，模型容易欠拟合</text>
  <text x="820" y="625" class="small" text-anchor="middle">训练和验证误差都上升</text>
</svg>
