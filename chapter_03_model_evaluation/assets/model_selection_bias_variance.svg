<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">使用验证集选择模型并诊断偏差和方差</title>
  <desc id="desc">上半部分展示训练集、验证集和测试集的划分及用途，下半部分展示训练误差和验证误差随模型复杂度变化的趋势。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 28px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .section { font: 700 20px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #1e293b; }
      .label { font: 600 17px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .small { font: 15px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .percent { font: 700 24px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #ffffff; }
      .axis { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); }
      .grid { stroke: #e2e8f0; stroke-width: 1; }
      .train-curve { fill: none; stroke: #2563eb; stroke-width: 4; stroke-linecap: round; }
      .cv-curve { fill: none; stroke: #dc2626; stroke-width: 4; stroke-linecap: round; }
      .guide { stroke: #16a34a; stroke-width: 2; stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="758" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="600" y="48" class="title" text-anchor="middle">模型选择：验证集负责选择，测试集负责最终评估</text>

  <text x="70" y="94" class="section">1. 数据划分与职责</text>
  <rect x="70" y="115" width="636" height="94" rx="12" fill="#2563eb"/>
  <rect x="706" y="115" width="212" height="94" fill="#d97706"/>
  <rect x="918" y="115" width="212" height="94" rx="12" fill="#64748b"/>

  <text x="388" y="152" class="percent" text-anchor="middle">训练集 60%</text>
  <text x="388" y="181" class="small" text-anchor="middle" fill="#ffffff" style="fill:#dbeafe">学习参数 w、b</text>
  <text x="812" y="152" class="percent" text-anchor="middle">验证集 20%</text>
  <text x="812" y="181" class="small" text-anchor="middle" fill="#ffffff" style="fill:#ffedd5">选择模型与超参数</text>
  <text x="1024" y="152" class="percent" text-anchor="middle">测试集 20%</text>
  <text x="1024" y="181" class="small" text-anchor="middle" fill="#ffffff" style="fill:#f1f5f9">最终评估一次</text>

  <line x1="388" y1="218" x2="388" y2="257" class="axis"/>
  <line x1="812" y1="218" x2="812" y2="257" class="axis"/>
  <line x1="1024" y1="218" x2="1024" y2="257" class="axis"/>
  <rect x="252" y="265" width="272" height="54" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <rect x="676" y="265" width="272" height="54" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <rect x="990" y="265" width="134" height="54" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="388" y="298" class="label" text-anchor="middle">训练全部候选模型</text>
  <text x="812" y="298" class="label" text-anchor="middle">选择最小 <tspan font-style="italic">J</tspan><tspan baseline-shift="sub" font-size="12">cv</tspan></text>
  <text x="1057" y="298" class="label" text-anchor="middle">报告 <tspan font-style="italic">J</tspan><tspan baseline-shift="sub" font-size="12">test</tspan></text>
  <line x1="524" y1="292" x2="668" y2="292" class="axis"/>
  <line x1="948" y1="292" x2="982" y2="292" class="axis"/>

  <line x1="70" y1="352" x2="1130" y2="352" stroke="#cbd5e1" stroke-width="2"/>
  <text x="70" y="394" class="section">2. 根据模型复杂度选择多项式阶数 d</text>

  <g aria-hidden="true">
    <line x1="118" y1="430" x2="1110" y2="430" class="grid"/>
    <line x1="118" y1="500" x2="1110" y2="500" class="grid"/>
    <line x1="118" y1="570" x2="1110" y2="570" class="grid"/>
    <line x1="118" y1="640" x2="1110" y2="640" class="grid"/>
  </g>

  <line x1="118" y1="670" x2="1125" y2="670" class="axis"/>
  <line x1="118" y1="670" x2="118" y2="414" class="axis"/>
  <text x="1128" y="698" class="small" text-anchor="end">模型复杂度 / 多项式阶数 d</text>
  <text x="88" y="425" class="small" transform="rotate(-90 88 425)">误差</text>

  <path d="M 145 493 C 310 557, 520 612, 1090 648" class="train-curve"/>
  <path d="M 145 470 C 320 548, 478 616, 625 620 C 790 624, 930 563, 1090 452" class="cv-curve"/>

  <line x1="625" y1="418" x2="625" y2="670" class="guide"/>
  <circle cx="625" cy="620" r="7" fill="#16a34a"/>
  <rect x="528" y="438" width="194" height="62" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="625" y="465" class="label" text-anchor="middle">验证误差最低</text>
  <text x="625" y="489" class="small" text-anchor="middle">选择 d*</text>

  <text x="218" y="580" class="label" text-anchor="middle" fill="#7c3aed" style="fill:#7c3aed">高偏差</text>
  <text x="218" y="605" class="small" text-anchor="middle">模型过于简单</text>
  <text x="625" y="708" class="label" text-anchor="middle" fill="#15803d" style="fill:#15803d">偏差与方差平衡</text>
  <text x="986" y="575" class="label" text-anchor="middle" fill="#be123c" style="fill:#be123c">高方差</text>
  <text x="986" y="600" class="small" text-anchor="middle">训练误差低，验证误差高</text>

  <line x1="790" y1="424" x2="848" y2="424" class="train-curve"/>
  <text x="862" y="430" class="small"><tspan font-style="italic">J</tspan><tspan baseline-shift="sub" font-size="11">train</tspan></text>
  <line x1="950" y1="424" x2="1008" y2="424" class="cv-curve"/>
  <text x="1022" y="430" class="small"><tspan font-style="italic">J</tspan><tspan baseline-shift="sub" font-size="11">cv</tspan></text>
</svg>
