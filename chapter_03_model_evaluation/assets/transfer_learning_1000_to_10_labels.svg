<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">从一千类图像预训练迁移到十个数字标签</title>
  <desc id="desc">上方使用一百万张图像和一千个类别进行监督预训练，下方复用前四层参数并将输出层替换为数字零到九的十个输出单元。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <g id="input-layer">
      <circle cx="0" cy="-48" r="10"/>
      <circle cx="0" cy="-16" r="10"/>
      <circle cx="0" cy="16" r="10"/>
      <circle cx="0" cy="48" r="10"/>
    </g>
    <g id="hidden-layer">
      <circle cx="0" cy="-58" r="10"/>
      <circle cx="0" cy="-24" r="10"/>
      <circle cx="0" cy="10" r="10"/>
      <circle cx="0" cy="44" r="10"/>
      <text x="0" y="72" text-anchor="middle" class="small">⋮</text>
    </g>
    <g id="source-output">
      <circle cx="0" cy="-58" r="10"/>
      <circle cx="0" cy="-25" r="10"/>
      <circle cx="0" cy="8" r="10"/>
      <text x="0" y="39" text-anchor="middle" class="small">⋮</text>
      <circle cx="0" cy="66" r="10"/>
    </g>
    <g id="target-output">
      <circle cx="0" cy="-58" r="10"/>
      <circle cx="0" cy="-25" r="10"/>
      <circle cx="0" cy="8" r="10"/>
      <text x="0" y="39" text-anchor="middle" class="small">⋮</text>
      <circle cx="0" cy="66" r="10"/>
    </g>
    <style>
      .title { font: 700 27px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; stroke: none; }
      .section { font: 700 21px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; stroke: none; }
      .label { font: 600 16px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #1e293b; stroke: none; }
      .small { font: 15px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #475569; stroke: none; }
      .math { font: italic 16px Georgia, "Times New Roman", serif; fill: #334155; stroke: none; }
      .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .transfer { stroke: #16a34a; stroke-width: 2.2; stroke-dasharray: 7 6; fill: none; marker-end: url(#arrow); }
      .input { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
      .hidden { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .source { fill: #ffedd5; stroke: #d97706; stroke-width: 2; }
      .target { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="778" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="600" y="43" class="title" text-anchor="middle">迁移学习：使用不同任务的数据</text>

  <text x="38" y="82" class="section">监督预训练</text>
  <rect x="38" y="102" width="218" height="180" rx="13" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="147" y="132" class="label" text-anchor="middle">源任务数据</text>
  <text x="68" y="166" class="small">猫</text>
  <text x="68" y="192" class="small">狗</text>
  <text x="68" y="218" class="small">汽车</text>
  <text x="68" y="244" class="small">人物 ···</text>
  <text x="172" y="181" class="label" text-anchor="middle">100 万张图像</text>
  <text x="172" y="221" class="label" text-anchor="middle">1000 个类别</text>

  <g class="input" transform="translate(310 190)"><use href="#input-layer"/></g>
  <g class="hidden" transform="translate(438 190)"><use href="#hidden-layer"/></g>
  <g class="hidden" transform="translate(566 190)"><use href="#hidden-layer"/></g>
  <g class="hidden" transform="translate(694 190)"><use href="#hidden-layer"/></g>
  <g class="hidden" transform="translate(822 190)"><use href="#hidden-layer"/></g>
  <g class="source" transform="translate(972 190)"><use href="#source-output"/></g>

  <line x1="322" y1="190" x2="425" y2="190" class="arrow"/>
  <line x1="450" y1="190" x2="553" y2="190" class="arrow"/>
  <line x1="578" y1="190" x2="681" y2="190" class="arrow"/>
  <line x1="706" y1="190" x2="809" y2="190" class="arrow"/>
  <line x1="834" y1="190" x2="959" y2="190" class="arrow"/>

  <text x="374" y="169" class="math" text-anchor="middle">W<tspan baseline-shift="super" font-size="11">[1]</tspan><tspan baseline-shift="baseline">, b</tspan><tspan baseline-shift="super" font-size="11">[1]</tspan></text>
  <text x="502" y="169" class="math" text-anchor="middle">W<tspan baseline-shift="super" font-size="11">[2]</tspan><tspan baseline-shift="baseline">, b</tspan><tspan baseline-shift="super" font-size="11">[2]</tspan></text>
  <text x="630" y="169" class="math" text-anchor="middle">W<tspan baseline-shift="super" font-size="11">[3]</tspan><tspan baseline-shift="baseline">, b</tspan><tspan baseline-shift="super" font-size="11">[3]</tspan></text>
  <text x="758" y="169" class="math" text-anchor="middle">W<tspan baseline-shift="super" font-size="11">[4]</tspan><tspan baseline-shift="baseline">, b</tspan><tspan baseline-shift="super" font-size="11">[4]</tspan></text>
  <text x="897" y="169" class="math" text-anchor="middle">W<tspan baseline-shift="super" font-size="11">[5]</tspan><tspan baseline-shift="baseline">, b</tspan><tspan baseline-shift="super" font-size="11">[5]</tspan></text>

  <text x="310" y="280" class="small" text-anchor="middle">输入 x</text>
  <text x="438" y="280" class="small" text-anchor="middle">第 1 层</text>
  <text x="566" y="280" class="small" text-anchor="middle">第 2 层</text>
  <text x="694" y="280" class="small" text-anchor="middle">第 3 层</text>
  <text x="822" y="280" class="small" text-anchor="middle">第 4 层</text>
  <text x="972" y="280" class="label" text-anchor="middle">1000 个输出单元</text>

  <rect x="1030" y="115" width="130" height="150" rx="12" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="1095" y="145" class="label" text-anchor="middle">输出标签</text>
  <text x="1095" y="175" class="small" text-anchor="middle">1</text>
  <text x="1095" y="201" class="small" text-anchor="middle">2</text>
  <text x="1095" y="227" class="small" text-anchor="middle">⋮</text>
  <text x="1095" y="253" class="small" text-anchor="middle">1000</text>

  <line x1="438" y1="288" x2="438" y2="450" class="transfer"/>
  <line x1="566" y1="288" x2="566" y2="450" class="transfer"/>
  <line x1="694" y1="288" x2="694" y2="450" class="transfer"/>
  <line x1="822" y1="288" x2="822" y2="450" class="transfer"/>
  <rect x="514" y="337" width="232" height="66" rx="10" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="630" y="365" class="label" text-anchor="middle" fill="#15803d" style="fill:#15803d">复制预训练参数</text>
  <text x="630" y="390" class="math" text-anchor="middle">W<tspan baseline-shift="super" font-size="11">[1:4]</tspan><tspan baseline-shift="baseline">, b</tspan><tspan baseline-shift="super" font-size="11">[1:4]</tspan></text>

  <line x1="940" y1="325" x2="1004" y2="389" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
  <line x1="1004" y1="325" x2="940" y2="389" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
  <text x="972" y="417" class="small" text-anchor="middle" fill="#b91c1c" style="fill:#b91c1c">丢弃原输出层</text>

  <text x="38" y="438" class="section">微调</text>
  <rect x="38" y="458" width="218" height="168" rx="13" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="147" y="489" class="label" text-anchor="middle">目标任务数据</text>
  <text x="147" y="531" class="label" text-anchor="middle">数字 0, 1, 2, …, 9</text>
  <text x="147" y="567" class="small" text-anchor="middle">相同输入类型：图像</text>
  <text x="147" y="601" class="label" text-anchor="middle">10 个类别</text>

  <g class="input" transform="translate(310 540)"><use href="#input-layer"/></g>
  <g class="hidden" transform="translate(438 540)"><use href="#hidden-layer"/></g>
  <g class="hidden" transform="translate(566 540)"><use href="#hidden-layer"/></g>
  <g class="hidden" transform="translate(694 540)"><use href="#hidden-layer"/></g>
  <g class="hidden" transform="translate(822 540)"><use href="#hidden-layer"/></g>
  <g class="target" transform="translate(972 540)"><use href="#target-output"/></g>

  <line x1="322" y1="540" x2="425" y2="540" class="arrow"/>
  <line x1="450" y1="540" x2="553" y2="540" class="arrow"/>
  <line x1="578" y1="540" x2="681" y2="540" class="arrow"/>
  <line x1="706" y1="540" x2="809" y2="540" class="arrow"/>
  <line x1="834" y1="540" x2="959" y2="540" class="arrow"/>

  <text x="374" y="519" class="math" text-anchor="middle">W<tspan baseline-shift="super" font-size="11">[1]</tspan><tspan baseline-shift="baseline">, b</tspan><tspan baseline-shift="super" font-size="11">[1]</tspan></text>
  <text x="502" y="519" class="math" text-anchor="middle">W<tspan baseline-shift="super" font-size="11">[2]</tspan><tspan baseline-shift="baseline">, b</tspan><tspan baseline-shift="super" font-size="11">[2]</tspan></text>
  <text x="630" y="519" class="math" text-anchor="middle">W<tspan baseline-shift="super" font-size="11">[3]</tspan><tspan baseline-shift="baseline">, b</tspan><tspan baseline-shift="super" font-size="11">[3]</tspan></text>
  <text x="758" y="519" class="math" text-anchor="middle">W<tspan baseline-shift="super" font-size="11">[4]</tspan><tspan baseline-shift="baseline">, b</tspan><tspan baseline-shift="super" font-size="11">[4]</tspan></text>
  <text x="897" y="519" class="math" text-anchor="middle" fill="#15803d" style="fill:#15803d">新 W<tspan baseline-shift="super" font-size="11">[5]</tspan><tspan baseline-shift="baseline">, b</tspan><tspan baseline-shift="super" font-size="11">[5]</tspan></text>

  <text x="310" y="630" class="small" text-anchor="middle">输入 x</text>
  <text x="438" y="630" class="small" text-anchor="middle">第 1 层</text>
  <text x="566" y="630" class="small" text-anchor="middle">第 2 层</text>
  <text x="694" y="630" class="small" text-anchor="middle">第 3 层</text>
  <text x="822" y="630" class="small" text-anchor="middle">第 4 层</text>
  <text x="972" y="630" class="label" text-anchor="middle">10 个输出单元</text>

  <rect x="1030" y="465" width="130" height="156" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="1095" y="493" class="label" text-anchor="middle">数字标签</text>
  <text x="1095" y="519" class="small" text-anchor="middle">0</text>
  <text x="1095" y="541" class="small" text-anchor="middle">1</text>
  <text x="1095" y="563" class="small" text-anchor="middle">2</text>
  <text x="1095" y="585" class="small" text-anchor="middle">⋮</text>
  <text x="1095" y="607" class="small" text-anchor="middle">9</text>

  <rect x="126" y="673" width="430" height="72" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="341" y="702" class="label" text-anchor="middle">方案 1：只训练输出层参数</text>
  <text x="341" y="728" class="small" text-anchor="middle">目标任务数据较少时冻结前四层</text>

  <rect x="644" y="673" width="430" height="72" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="2"/>
  <text x="859" y="702" class="label" text-anchor="middle">方案 2：训练所有参数</text>
  <text x="859" y="728" class="small" text-anchor="middle">目标任务数据较多时微调整个网络</text>
</svg>
