<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" role="img" aria-labelledby="title desc">
  <title id="title">逻辑回归决策边界示意图</title>
  <desc id="desc">二维特征平面中，逻辑回归先计算 z = w_1 x_1 + w_2 x_2 + b，再用 Sigmoid 函数输出概率；当 z = 0 时形成决策边界。</desc>
  <defs>
    <marker id="arrow" markerHeight="7" markerWidth="7" orient="auto" refX="6" refY="3">
      <path d="M0,0 L6,3 L0,6 Z" fill="#222"/>
    </marker>
    <pattern id="positiveHatch" patternUnits="userSpaceOnUse" width="10" height="10">
      <path d="M0,10 L10,0" stroke="#d36b6b" stroke-width="0.7" opacity="0.45"/>
    </pattern>
    <pattern id="negativeHatch" patternUnits="userSpaceOnUse" width="10" height="10">
      <path d="M0,0 L10,10" stroke="#4f85c5" stroke-width="0.7" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="820" height="520" fill="#fff"/>

  <g transform="translate(92 46)">
    <rect x="0" y="0" width="620" height="380" fill="#fff" stroke="#d0d0d0" stroke-width="1"/>

    <polygon points="0,380 0,0 620,0 620,108 0,335" fill="#f4f8fd"/>
    <polygon points="0,335 620,108 620,380 0,380" fill="#fff6f4"/>
    <polygon points="0,380 0,0 620,0 620,108 0,335" fill="url(#negativeHatch)" opacity="0.55"/>
    <polygon points="0,335 620,108 620,380 0,380" fill="url(#positiveHatch)" opacity="0.55"/>

    <g stroke="#e3e3e3" stroke-width="1">
      <line x1="103" y1="0" x2="103" y2="380"/>
      <line x1="206" y1="0" x2="206" y2="380"/>
      <line x1="310" y1="0" x2="310" y2="380"/>
      <line x1="413" y1="0" x2="413" y2="380"/>
      <line x1="516" y1="0" x2="516" y2="380"/>
      <line x1="0" y1="76" x2="620" y2="76"/>
      <line x1="0" y1="152" x2="620" y2="152"/>
      <line x1="0" y1="228" x2="620" y2="228"/>
      <line x1="0" y1="304" x2="620" y2="304"/>
    </g>

    <line x1="0" y1="335" x2="620" y2="108" stroke="#111" stroke-width="3"/>
    <g font-family="Times New Roman, serif" fill="#111" text-anchor="middle" transform="translate(312 221) rotate(-20)">
      <text x="0" y="-14" font-size="18">
        <tspan font-style="italic">z</tspan>
        <tspan> = </tspan>
        <tspan font-style="italic">w</tspan><tspan baseline-shift="sub" font-size="12">1</tspan>
        <tspan font-style="italic">x</tspan><tspan baseline-shift="sub" font-size="12">1</tspan>
        <tspan> + </tspan>
        <tspan font-style="italic">w</tspan><tspan baseline-shift="sub" font-size="12">2</tspan>
        <tspan font-style="italic">x</tspan><tspan baseline-shift="sub" font-size="12">2</tspan>
        <tspan> + </tspan>
        <tspan font-style="italic">b</tspan>
        <tspan> = 0</tspan>
      </text>
      <text x="0" y="30" font-size="18">
        <tspan font-style="italic">f</tspan><tspan baseline-shift="sub" font-size="12">w,b</tspan>
        <tspan>(</tspan><tspan font-style="italic">x</tspan><tspan>) = </tspan>
        <tspan>1 / (1 + </tspan><tspan font-style="italic">e</tspan><tspan baseline-shift="super" font-size="12">-z</tspan><tspan>) = 0.5</tspan>
      </text>
    </g>

    <g fill="#2f6fb3" stroke="#173f68" stroke-width="1.5">
      <circle cx="78" cy="104" r="7"/>
      <circle cx="122" cy="176" r="7"/>
      <circle cx="168" cy="108" r="7"/>
      <circle cx="214" cy="202" r="7"/>
      <circle cx="252" cy="136" r="7"/>
      <circle cx="300" cy="154" r="7"/>
      <circle cx="358" cy="110" r="7"/>
      <circle cx="432" cy="88" r="7"/>
      <circle cx="492" cy="74" r="7"/>
    </g>

    <g fill="#c74b45" stroke="#7b211d" stroke-width="1.5">
      <circle cx="110" cy="352" r="7"/>
      <circle cx="162" cy="316" r="7"/>
      <circle cx="228" cy="338" r="7"/>
      <circle cx="286" cy="288" r="7"/>
      <circle cx="348" cy="312" r="7"/>
      <circle cx="410" cy="252" r="7"/>
      <circle cx="484" cy="276" r="7"/>
      <circle cx="542" cy="220" r="7"/>
      <circle cx="574" cy="306" r="7"/>
    </g>

    <g stroke="#222" stroke-width="1.8" fill="none" marker-end="url(#arrow)">
      <line x1="0" y1="380" x2="648" y2="380"/>
      <line x1="0" y1="380" x2="0" y2="-28"/>
    </g>

    <g font-family="Times New Roman, serif" font-size="19" fill="#111">
      <text x="656" y="386"><tspan font-style="italic">x</tspan><tspan baseline-shift="sub" font-size="13">1</tspan></text>
      <text x="-10" y="-36"><tspan font-style="italic">x</tspan><tspan baseline-shift="sub" font-size="13">2</tspan></text>
      <text x="410" y="42">
        <tspan font-style="italic">z</tspan><tspan> &lt; 0, </tspan>
        <tspan font-style="italic">f</tspan><tspan baseline-shift="sub" font-size="13">w,b</tspan>
        <tspan>(</tspan><tspan font-style="italic">x</tspan><tspan>) &lt; 0.5</tspan>
      </text>
      <text x="410" y="66">predict y = 0</text>
      <text x="370" y="324">
        <tspan font-style="italic">z</tspan><tspan> >= 0, </tspan>
        <tspan font-style="italic">f</tspan><tspan baseline-shift="sub" font-size="13">w,b</tspan>
        <tspan>(</tspan><tspan font-style="italic">x</tspan><tspan>) >= 0.5</tspan>
      </text>
      <text x="370" y="348">predict y = 1</text>
    </g>

    <g font-family="Times New Roman, serif" font-size="16" fill="#333">
      <circle cx="28" cy="424" r="6" fill="#2f6fb3" stroke="#173f68" stroke-width="1.3"/>
      <text x="44" y="429">negative class, y = 0</text>
      <circle cx="238" cy="424" r="6" fill="#c74b45" stroke="#7b211d" stroke-width="1.3"/>
      <text x="254" y="429">positive class, y = 1</text>
      <line x1="452" y1="424" x2="492" y2="424" stroke="#111" stroke-width="3"/>
      <text x="504" y="429">decision boundary</text>
    </g>
  </g>
</svg>
