<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">XGBoost逐轮修正预测误差</title>
  <desc id="desc">训练数据依次经过第一棵树、第二棵树和第B棵树，每棵新树拟合当前模型的误差，所有树的输出按学习率相加得到最终预测。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 28px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .heading { font: 700 18px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .text { font: 15px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .small { font: 14px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .formula { font: 600 18px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #15803d; }
      .edge { fill: none; stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrow); }
      .feedback { fill: none; stroke: #dc2626; stroke-width: 2.5; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .tree-edge { fill: none; stroke: #2563eb; stroke-width: 2.2; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="678" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="600" y="45" class="title" text-anchor="middle">XGBoost：后面的树逐轮修正前面的误差</text>

  <rect x="35" y="220" width="180" height="170" rx="16" fill="#f8fafc" stroke="#94a3b8" stroke-width="2.5"/>
  <text x="125" y="258" class="heading" text-anchor="middle">训练数据</text>
  <g>
    <circle cx="80" cy="300" r="12" fill="#93c5fd" stroke="#2563eb"/>
    <circle cx="125" cy="300" r="12" fill="#93c5fd" stroke="#2563eb"/>
    <circle cx="170" cy="300" r="12" fill="#fca5a5" stroke="#dc2626"/>
    <circle cx="80" cy="345" r="12" fill="#93c5fd" stroke="#2563eb"/>
    <circle cx="125" cy="345" r="12" fill="#fca5a5" stroke="#dc2626"/>
    <circle cx="170" cy="345" r="12" fill="#93c5fd" stroke="#2563eb"/>
  </g>
  <text x="125" y="378" class="small" text-anchor="middle">输入 x 与标签 y</text>

  <path d="M215 305 L300 305" class="edge"/>

  <g transform="translate(300 190)">
    <rect width="220" height="230" rx="17" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
    <text x="110" y="37" class="heading" text-anchor="middle">第 1 棵树</text>
    <path d="M110 63 L65 105 M110 63 L155 105 M65 105 L40 145 M65 105 L90 145 M155 105 L130 145 M155 105 L180 145" class="tree-edge"/>
    <circle cx="110" cy="63" r="8" fill="#2563eb"/>
    <circle cx="65" cy="105" r="7" fill="#60a5fa"/><circle cx="155" cy="105" r="7" fill="#60a5fa"/>
    <circle cx="40" cy="145" r="7" fill="#22c55e"/><circle cx="90" cy="145" r="7" fill="#22c55e"/>
    <circle cx="130" cy="145" r="7" fill="#22c55e"/><circle cx="180" cy="145" r="7" fill="#22c55e"/>
    <text x="110" y="185" class="text" text-anchor="middle">得到初步预测</text>
    <text x="110" y="211" class="small" text-anchor="middle">计算当前损失与修正量</text>
  </g>

  <path d="M520 305 L605 305" class="edge"/>
  <text x="562" y="283" class="small" text-anchor="middle">残差 / 梯度</text>

  <g transform="translate(605 190)">
    <rect width="220" height="230" rx="17" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/>
    <text x="110" y="37" class="heading" text-anchor="middle">第 2 棵树</text>
    <path d="M110 63 L70 100 M110 63 L160 112 M70 100 L42 145 M70 100 L98 145 M160 112 L187 145" class="tree-edge"/>
    <circle cx="110" cy="63" r="8" fill="#f97316"/>
    <circle cx="70" cy="100" r="7" fill="#fb923c"/><circle cx="160" cy="112" r="7" fill="#fb923c"/>
    <circle cx="42" cy="145" r="7" fill="#22c55e"/><circle cx="98" cy="145" r="7" fill="#22c55e"/>
    <circle cx="187" cy="145" r="7" fill="#22c55e"/>
    <text x="110" y="185" class="text" text-anchor="middle">拟合当前修正量</text>
    <text x="110" y="211" class="small" text-anchor="middle">更新后再次计算误差</text>
  </g>

  <path d="M825 305 L910 305" class="edge"/>
  <text x="867" y="283" class="small" text-anchor="middle">新的修正量</text>

  <g transform="translate(910 190)">
    <rect width="220" height="230" rx="17" fill="#f0fdf4" stroke="#22c55e" stroke-width="2.5"/>
    <text x="110" y="37" class="heading" text-anchor="middle">第 B 棵树</text>
    <path d="M110 63 L57 110 M110 63 L163 97 M57 110 L32 145 M57 110 L82 145 M163 97 L137 145 M163 97 L190 145" class="tree-edge"/>
    <circle cx="110" cy="63" r="8" fill="#16a34a"/>
    <circle cx="57" cy="110" r="7" fill="#4ade80"/><circle cx="163" cy="97" r="7" fill="#4ade80"/>
    <circle cx="32" cy="145" r="7" fill="#22c55e"/><circle cx="82" cy="145" r="7" fill="#22c55e"/>
    <circle cx="137" cy="145" r="7" fill="#22c55e"/><circle cx="190" cy="145" r="7" fill="#22c55e"/>
    <text x="110" y="185" class="text" text-anchor="middle">继续降低当前损失</text>
    <text x="110" y="211" class="small" text-anchor="middle">各棵树按顺序训练</text>
  </g>

  <path d="M410 420 C410 500, 650 515, 650 550" class="edge"/>
  <path d="M715 420 C715 500, 690 515, 690 550" class="edge"/>
  <path d="M1020 420 C1020 500, 730 515, 730 550" class="edge"/>

  <rect x="250" y="550" width="700" height="85" rx="15" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="600" y="584" class="heading" text-anchor="middle">最终预测：累加所有树的修正结果</text>
  <text x="600" y="615" class="formula" text-anchor="middle">ŷ⁽ᴮ⁾ = ŷ⁽⁰⁾ + ηf₁(x) + ηf₂(x) + ··· + ηfᴮ(x)</text>

  <path d="M730 550 C900 515, 1090 500, 1090 440" class="feedback"/>
  <text x="1005" y="490" class="small" text-anchor="middle" fill="#b91c1c">误差逐轮减小</text>
</svg>
