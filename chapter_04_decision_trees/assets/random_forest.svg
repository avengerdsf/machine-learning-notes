<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">随机森林训练与预测过程</title>
  <desc id="desc">原始训练集经过多次放回抽样生成不同训练集，每份数据训练一棵使用随机特征子集的决策树，最后通过多数投票得到分类结果。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 28px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .section { font: 700 18px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .text { font: 15px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .small { font: 14px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .vote { font: 700 19px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #15803d; }
      .edge { fill: none; stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrow); }
      .tree-edge { fill: none; stroke: #2563eb; stroke-width: 2.2; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="718" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="600" y="45" class="title" text-anchor="middle">随机森林：抽样、建树与聚合</text>

  <rect x="35" y="235" width="190" height="210" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="130" y="275" class="section" text-anchor="middle">原始训练集</text>
  <text x="130" y="312" class="text" text-anchor="middle">m 个样本</text>
  <g fill="#93c5fd" stroke="#2563eb">
    <circle cx="82" cy="350" r="13"/><circle cx="130" cy="350" r="13"/><circle cx="178" cy="350" r="13"/>
    <circle cx="82" cy="393" r="13"/><circle cx="130" cy="393" r="13"/><circle cx="178" cy="393" r="13"/>
  </g>
  <text x="130" y="427" class="small" text-anchor="middle">重复放回抽样</text>

  <path d="M225 285 C270 240, 290 175, 340 145" class="edge"/>
  <path d="M225 340 L340 340" class="edge"/>
  <path d="M225 395 C270 445, 290 510, 340 535" class="edge"/>

  <rect x="340" y="90" width="250" height="145" rx="15" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="465" y="124" class="section" text-anchor="middle">抽样训练集 1</text>
  <text x="465" y="157" class="text" text-anchor="middle">2，1，2，5，4，…</text>
  <text x="465" y="190" class="small" text-anchor="middle">包含重复与遗漏样本</text>

  <rect x="340" y="268" width="250" height="145" rx="15" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="465" y="302" class="section" text-anchor="middle">抽样训练集 2</text>
  <text x="465" y="335" class="text" text-anchor="middle">4，3，1，4，2，…</text>
  <text x="465" y="368" class="small" text-anchor="middle">独立执行放回抽样</text>

  <rect x="340" y="446" width="250" height="145" rx="15" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="465" y="480" class="section" text-anchor="middle">抽样训练集 B</text>
  <text x="465" y="513" class="text" text-anchor="middle">1，5，3，3，2，…</text>
  <text x="465" y="546" class="small" text-anchor="middle">共生成 B 份训练集</text>

  <path d="M590 162 L690 162" class="edge"/>
  <path d="M590 340 L690 340" class="edge"/>
  <path d="M590 518 L690 518" class="edge"/>

  <g transform="translate(690 88)">
    <rect width="230" height="148" rx="15" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
    <text x="115" y="30" class="section" text-anchor="middle">决策树 1</text>
    <path d="M115 48 L67 88 M115 48 L163 88 M67 88 L43 122 M67 88 L91 122 M163 88 L139 122 M163 88 L187 122" class="tree-edge"/>
    <circle cx="115" cy="48" r="8" fill="#2563eb"/>
    <circle cx="67" cy="88" r="7" fill="#60a5fa"/><circle cx="163" cy="88" r="7" fill="#60a5fa"/>
    <circle cx="43" cy="122" r="7" fill="#22c55e"/><circle cx="91" cy="122" r="7" fill="#22c55e"/>
    <circle cx="139" cy="122" r="7" fill="#22c55e"/><circle cx="187" cy="122" r="7" fill="#22c55e"/>
  </g>

  <g transform="translate(690 266)">
    <rect width="230" height="148" rx="15" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
    <text x="115" y="30" class="section" text-anchor="middle">决策树 2</text>
    <path d="M115 48 L75 85 M115 48 L165 95 M75 85 L45 122 M75 85 L105 122 M165 95 L190 122" class="tree-edge"/>
    <circle cx="115" cy="48" r="8" fill="#2563eb"/>
    <circle cx="75" cy="85" r="7" fill="#60a5fa"/><circle cx="165" cy="95" r="7" fill="#60a5fa"/>
    <circle cx="45" cy="122" r="7" fill="#22c55e"/><circle cx="105" cy="122" r="7" fill="#22c55e"/>
    <circle cx="190" cy="122" r="7" fill="#22c55e"/>
  </g>

  <g transform="translate(690 444)">
    <rect width="230" height="148" rx="15" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
    <text x="115" y="30" class="section" text-anchor="middle">决策树 B</text>
    <path d="M115 48 L62 92 M115 48 L168 82 M62 92 L38 122 M62 92 L86 122 M168 82 L140 122 M168 82 L196 122" class="tree-edge"/>
    <circle cx="115" cy="48" r="8" fill="#2563eb"/>
    <circle cx="62" cy="92" r="7" fill="#60a5fa"/><circle cx="168" cy="82" r="7" fill="#60a5fa"/>
    <circle cx="38" cy="122" r="7" fill="#22c55e"/><circle cx="86" cy="122" r="7" fill="#22c55e"/>
    <circle cx="140" cy="122" r="7" fill="#22c55e"/><circle cx="196" cy="122" r="7" fill="#22c55e"/>
  </g>

  <text x="805" y="624" class="small" text-anchor="middle">每个节点只从随机选择的 k 个特征中寻找最佳划分</text>

  <path d="M920 162 C970 190, 980 250, 1015 300" class="edge"/>
  <path d="M920 340 L1015 340" class="edge"/>
  <path d="M920 518 C970 490, 980 430, 1015 380" class="edge"/>

  <rect x="1015" y="270" width="155" height="145" rx="18" fill="#f0fdf4" stroke="#22c55e" stroke-width="3"/>
  <text x="1092" y="307" class="section" text-anchor="middle">聚合预测</text>
  <text x="1092" y="340" class="text" text-anchor="middle">分类：多数投票</text>
  <text x="1092" y="370" class="text" text-anchor="middle">回归：取平均值</text>
  <text x="1092" y="400" class="vote" text-anchor="middle">最终结果</text>

  <rect x="255" y="655" width="690" height="42" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="600" y="682" class="text" text-anchor="middle">数据随机性 + 特征随机性 → 多棵不同的树 → 更稳定的集成预测</text>
</svg>
