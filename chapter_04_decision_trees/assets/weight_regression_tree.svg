<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">使用动物特征预测体重的回归树</title>
  <desc id="desc">回归树按照耳朵形状划分动物，尖耳朵叶节点预测平均体重8.52千克，垂耳朵叶节点预测平均体重14.56千克，方差下降为8.84。</desc>
  <defs>
    <style>
      .title { font: 700 28px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 16px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .node-title { font: 700 20px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .node-text { font: 15px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .branch { font: 600 17px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .value { font: 700 22px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #15803d; }
      .formula { font: 600 18px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .edge { fill: none; stroke: #64748b; stroke-width: 3; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="718" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="600" y="45" class="title" text-anchor="middle">回归树：使用动物特征预测体重</text>
  <text x="600" y="75" class="subtitle" text-anchor="middle">目标 y 为连续值；每个叶节点输出该节点训练样本体重的平均数</text>

  <path d="M 600 205 L 340 330" class="edge"/>
  <path d="M 600 205 L 860 330" class="edge"/>

  <rect x="455" y="105" width="290" height="105" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="600" y="142" class="node-title" text-anchor="middle">耳朵形状？</text>
  <text x="600" y="172" class="node-text" text-anchor="middle">10 个样本</text>
  <text x="600" y="195" class="node-text" text-anchor="middle">样本方差 V<tspan baseline-shift="sub">root</tspan> = 20.51</text>

  <text x="455" y="267" class="branch" text-anchor="middle">尖耳朵</text>
  <text x="745" y="267" class="branch" text-anchor="middle">垂耳朵</text>

  <rect x="125" y="330" width="430" height="220" rx="18" fill="#f0fdf4" stroke="#22c55e" stroke-width="3"/>
  <text x="340" y="370" class="node-title" text-anchor="middle">尖耳朵叶节点</text>
  <text x="340" y="407" class="node-text" text-anchor="middle">体重：7.2，9.2，8.4，7.6，10.2</text>
  <text x="340" y="442" class="node-text" text-anchor="middle">样本方差：1.47</text>
  <line x1="185" y1="465" x2="495" y2="465" stroke="#86efac" stroke-width="2"/>
  <text x="340" y="505" class="value" text-anchor="middle">预测体重 ŷ = 8.52</text>
  <text x="340" y="532" class="node-text" text-anchor="middle">叶节点样本均值</text>

  <rect x="645" y="330" width="430" height="220" rx="18" fill="#f0fdf4" stroke="#22c55e" stroke-width="3"/>
  <text x="860" y="370" class="node-title" text-anchor="middle">垂耳朵叶节点</text>
  <text x="860" y="407" class="node-text" text-anchor="middle">体重：8.8，15，11，18，20</text>
  <text x="860" y="442" class="node-text" text-anchor="middle">样本方差：21.87</text>
  <line x1="705" y1="465" x2="1015" y2="465" stroke="#86efac" stroke-width="2"/>
  <text x="860" y="505" class="value" text-anchor="middle">预测体重 ŷ = 14.56</text>
  <text x="860" y="532" class="node-text" text-anchor="middle">叶节点样本均值</text>

  <rect x="150" y="595" width="900" height="78" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="600" y="626" class="formula" text-anchor="middle">方差下降 = 20.51 − [(5/10) × 1.47 + (5/10) × 21.87] = 8.84</text>
  <text x="600" y="653" class="subtitle" text-anchor="middle">在所有候选特征中选择方差下降最大的划分</text>
</svg>
