<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">线性激活函数曲线</title>
  <desc id="desc">线性激活函数的输出恒等于输入，是一条经过原点且斜率为一的直线。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <style>
      .title { font: 700 24px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .formula { font: italic 20px Georgia, "Times New Roman", serif; fill: #047857; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .axis { stroke: #374151; stroke-width: 1.8; marker-end: url(#arrow); }
      .tick { font: 14px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .curve { fill: none; stroke: #059669; stroke-width: 4; stroke-linecap: round; }
    </style>
  </defs>
  <rect x="1" y="1" width="798" height="498" rx="18" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="40" y="43" class="title">线性激活</text>
  <text x="400" y="43" class="formula" text-anchor="middle">g(z) = z</text>

  <g aria-hidden="true">
    <line class="grid" x1="100" y1="90" x2="100" y2="390"/>
    <line class="grid" x1="250" y1="90" x2="250" y2="390"/>
    <line class="grid" x1="400" y1="90" x2="400" y2="390"/>
    <line class="grid" x1="550" y1="90" x2="550" y2="390"/>
    <line class="grid" x1="700" y1="90" x2="700" y2="390"/>
    <line class="grid" x1="100" y1="90" x2="700" y2="90"/>
    <line class="grid" x1="100" y1="165" x2="700" y2="165"/>
    <line class="grid" x1="100" y1="240" x2="700" y2="240"/>
    <line class="grid" x1="100" y1="315" x2="700" y2="315"/>
    <line class="grid" x1="100" y1="390" x2="700" y2="390"/>
  </g>

  <line class="axis" x1="90" y1="240" x2="718" y2="240"/>
  <line class="axis" x1="400" y1="405" x2="400" y2="78"/>
  <line class="curve" x1="100" y1="390" x2="700" y2="90"/>

  <text x="100" y="266" class="tick" text-anchor="middle">−6</text>
  <text x="250" y="266" class="tick" text-anchor="middle">−3</text>
  <text x="400" y="266" class="tick" text-anchor="middle">0</text>
  <text x="550" y="266" class="tick" text-anchor="middle">3</text>
  <text x="700" y="266" class="tick" text-anchor="middle">6</text>
  <text x="82" y="395" class="tick" text-anchor="end">−6</text>
  <text x="82" y="320" class="tick" text-anchor="end">−3</text>
  <text x="82" y="245" class="tick" text-anchor="end">0</text>
  <text x="82" y="170" class="tick" text-anchor="end">3</text>
  <text x="82" y="95" class="tick" text-anchor="end">6</text>
  <text x="730" y="245" class="formula">z</text>
  <text x="408" y="76" class="formula">g(z)</text>
</svg>
