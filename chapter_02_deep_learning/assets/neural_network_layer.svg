<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">输入层、隐藏层和输出层结构示意图</title>
  <desc id="desc">三个输入节点全连接到三个隐藏层神经元，三个隐藏层神经元再连接到一个输出节点。</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <style>
      .layer-title { font: 700 24px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .layer-subtitle { font: 15px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .connection { stroke: #94a3b8; stroke-width: 2; opacity: 0.62; marker-end: url(#arrow); }
      .node-label { font: italic 22px Georgia, "Times New Roman", serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .formula { font: italic 21px Georgia, "Times New Roman", serif; fill: #312e81; text-anchor: middle; }
    </style>
  </defs>

  <rect width="960" height="560" rx="24" fill="url(#background)"/>
  <rect x="390" y="84" width="200" height="380" rx="24" fill="#eef2ff" stroke="#a5b4fc" stroke-width="2" stroke-dasharray="7 7"/>

  <text x="170" y="48" class="layer-title" text-anchor="middle">输入层</text>
  <text x="170" y="72" class="layer-subtitle" text-anchor="middle">输入向量 x</text>
  <text x="490" y="48" class="layer-title" text-anchor="middle">隐藏层</text>
  <text x="490" y="72" class="layer-subtitle" text-anchor="middle">本节重点：3 个神经元</text>
  <text x="790" y="48" class="layer-title" text-anchor="middle">输出层</text>
  <text x="790" y="72" class="layer-subtitle" text-anchor="middle">预测结果</text>

  <g aria-label="输入层到隐藏层的全连接">
    <line class="connection" x1="212" y1="150" x2="442" y2="150"/>
    <line class="connection" x1="208" y1="166" x2="446" y2="264"/>
    <line class="connection" x1="200" y1="181" x2="455" y2="379"/>
    <line class="connection" x1="208" y1="264" x2="446" y2="166"/>
    <line class="connection" x1="212" y1="280" x2="442" y2="280"/>
    <line class="connection" x1="208" y1="296" x2="446" y2="394"/>
    <line class="connection" x1="200" y1="379" x2="455" y2="181"/>
    <line class="connection" x1="208" y1="394" x2="446" y2="296"/>
    <line class="connection" x1="212" y1="410" x2="442" y2="410"/>
  </g>

  <g aria-label="隐藏层到输出层的全连接">
    <line class="connection" x1="530" y1="176" x2="752" y2="262"/>
    <line class="connection" x1="532" y1="280" x2="742" y2="280"/>
    <line class="connection" x1="530" y1="384" x2="752" y2="298"/>
  </g>

  <g filter="url(#shadow)" aria-label="输入节点">
    <circle class="node input-node" cx="170" cy="150" r="42" fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/>
    <circle class="node input-node" cx="170" cy="280" r="42" fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/>
    <circle class="node input-node" cx="170" cy="410" r="42" fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/>
  </g>
  <text x="170" y="150" class="node-label">x<tspan baseline-shift="sub" font-size="15">1</tspan></text>
  <text x="170" y="280" class="node-label">x<tspan baseline-shift="sub" font-size="15">2</tspan></text>
  <text x="170" y="410" class="node-label">x<tspan baseline-shift="sub" font-size="15">3</tspan></text>

  <g filter="url(#shadow)" aria-label="隐藏层节点">
    <circle class="node hidden-node" cx="490" cy="150" r="42" fill="#e0e7ff" stroke="#6366f1" stroke-width="4"/>
    <circle class="node hidden-node" cx="490" cy="280" r="42" fill="#e0e7ff" stroke="#6366f1" stroke-width="4"/>
    <circle class="node hidden-node" cx="490" cy="410" r="42" fill="#e0e7ff" stroke="#6366f1" stroke-width="4"/>
  </g>
  <text x="490" y="150" class="node-label">a<tspan baseline-shift="sub" font-size="15">1</tspan><tspan baseline-shift="super" font-size="13">[1]</tspan></text>
  <text x="490" y="280" class="node-label">a<tspan baseline-shift="sub" font-size="15">2</tspan><tspan baseline-shift="super" font-size="13">[1]</tspan></text>
  <text x="490" y="410" class="node-label">a<tspan baseline-shift="sub" font-size="15">3</tspan><tspan baseline-shift="super" font-size="13">[1]</tspan></text>

  <g filter="url(#shadow)" aria-label="输出节点">
    <circle class="node output-node" cx="790" cy="280" r="48" fill="#dcfce7" stroke="#22c55e" stroke-width="4"/>
  </g>
  <text x="790" y="280" class="node-label" font-size="26">ŷ</text>

  <rect x="250" y="485" width="480" height="52" rx="14" fill="#ffffff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="490" y="518" class="formula">
    z<tspan baseline-shift="sub" font-size="14">j</tspan>
    <tspan baseline-shift="baseline"> = w</tspan><tspan baseline-shift="sub" font-size="14">j</tspan><tspan baseline-shift="super" font-size="13">T</tspan><tspan baseline-shift="baseline">x + b</tspan><tspan baseline-shift="sub" font-size="14">j</tspan>
    <tspan baseline-shift="baseline" dx="28">a</tspan><tspan baseline-shift="sub" font-size="14">j</tspan><tspan baseline-shift="super" font-size="13">[1]</tspan><tspan baseline-shift="baseline"> = g</tspan><tspan baseline-shift="sub" font-size="14">j</tspan><tspan baseline-shift="baseline">(z</tspan><tspan baseline-shift="sub" font-size="14">j</tspan><tspan baseline-shift="baseline">)</tspan>
  </text>
</svg>
